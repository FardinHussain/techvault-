<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Orders — TechVault</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">Tech<span>Vault</span></a>
    <div class="navbar-links">
      <a class="nav-link" href="shop.html">Shop</a>
      <a class="nav-link active" href="orders.html">Orders</a>
      <div id="nav-user-menu" class="hidden" style="display:flex;align-items:center;gap:6px">
        <span id="nav-user-name" style="font-size:14px;color:var(--text-secondary)"></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout-btn">Logout</button>
      </div>
      <a class="nav-link" href="login.html" id="nav-login-link">Login</a>
      <a class="nav-cart" href="cart.html">🛒 Cart <span class="cart-badge hidden">0</span></a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="orders.html">My Orders</a>
  <a href="cart.html">Cart 🛒</a>
</div>

<div class="page-header">
  <div class="container">
    <h1>My Orders</h1>
    <p>Track and manage your past purchases</p>
  </div>
</div>

<div class="container" style="padding-bottom:80px;max-width:860px">

  <!-- Empty state (hidden by default) -->
  <div id="orders-empty" class="empty-state hidden">
    <div class="icon">📦</div>
    <h3>No orders yet</h3>
    <p>You haven't placed any orders. Start shopping and they'll appear here.</p>
    <a href="shop.html" class="btn btn-primary btn-lg" style="margin-top:24px">Shop Now →</a>
  </div>

  <!-- Orders list -->
  <div id="orders-container"></div>

</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="padding-top:32px;border-top:1px solid var(--border)">
      <span>© 2025 TechVault. All rights reserved.</span>
      <a href="shop.html" style="color:var(--accent)">← Continue Shopping</a>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
