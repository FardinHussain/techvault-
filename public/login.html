<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — TechVault</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">Tech<span>Vault</span></a>
    <div class="navbar-links">
      <a class="nav-link" href="shop.html">Shop</a>
      <a class="nav-cart" href="cart.html">🛒 Cart <span class="cart-badge hidden">0</span></a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box" style="animation:fadeIn .4s ease">
    <div class="auth-logo">Tech<span>Vault</span></div>
    <div class="auth-subtitle">Welcome back — sign in to your account</div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Sign In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>

    <div class="divider"></div>

    <div style="text-align:center;font-size:12px;color:var(--text-muted)">
      Admin? Use your admin credentials to access
      <a href="admin.html" style="color:var(--accent)">the dashboard</a>.
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
