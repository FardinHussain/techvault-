<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — TechVault</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">Tech<span>Vault</span></a>
    <div class="navbar-links">
      <a class="nav-link" href="shop.html">Shop</a>
      <a class="nav-link" href="login.html" id="nav-login-link">Login</a>
      <div id="nav-user-menu" class="hidden" style="display:flex;align-items:center;gap:6px">
        <span id="nav-user-name" style="font-size:14px;color:var(--text-secondary)"></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout-btn">Logout</button>
      </div>
      <a class="nav-cart active" href="cart.html" style="color:var(--accent);border-color:var(--accent)">
        🛒 Cart <span class="cart-badge hidden">0</span>
      </a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="orders.html">Orders</a>
  <a href="login.html">Login</a>
</div>

<div class="page-header">
  <div class="container">
    <h1>Shopping Cart</h1>
    <p>Review your items before checking out</p>
  </div>
</div>

<div class="container" style="padding-bottom:80px">

  <!-- Empty state -->
  <div id="cart-empty" class="empty-state hidden">
    <div class="icon">🛒</div>
    <h3>Your cart is empty</h3>
    <p>Looks like you haven't added anything yet.</p>
    <a href="shop.html" class="btn btn-primary btn-lg" style="margin-top:24px">Start Shopping →</a>
  </div>

  <div class="cart-layout" id="cart-layout">
    <!-- Items -->
    <div>
      <div id="cart-items"></div>
    </div>
    <!-- Summary -->
    <div>
      <div class="order-summary-box" id="order-summary"></div>
      <button class="btn btn-primary btn-full btn-lg" id="checkout-btn" style="margin-top:16px;display:none">
        Proceed to Checkout →
      </button>
      <a href="shop.html" class="btn btn-ghost btn-full btn-sm" style="margin-top:10px;text-align:center">
        ← Continue Shopping
      </a>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="padding-top:32px;border-top:1px solid var(--border)">
      <span>© 2025 TechVault.</span>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
