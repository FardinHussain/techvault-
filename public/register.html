<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Account — TechVault</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">Tech<span>Vault</span></a>
    <div class="navbar-links">
      <a class="nav-link" href="shop.html">Shop</a>
      <a class="nav-cart" href="cart.html">🛒 Cart <span class="cart-badge hidden">0</span></a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box" style="animation:fadeIn .4s ease">
    <div class="auth-logo">Tech<span>Vault</span></div>
    <div class="auth-subtitle">Create your account and start shopping</div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullname" class="form-input" placeholder="John Doe"
          autocomplete="name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com"
          autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--text-muted);font-size:11px">(min 6 characters)</span></label>
        <input type="password" name="password" class="form-input" placeholder="Create a password"
          autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm" class="form-input" placeholder="Repeat your password"
          autocomplete="new-password" required>
      </div>

      <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px;line-height:1.6">
        By creating an account you agree to our
        <a href="#" style="color:var(--accent)">Terms of Service</a> and
        <a href="#" style="color:var(--accent)">Privacy Policy</a>.
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
